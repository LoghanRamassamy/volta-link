version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      # prevent host node_modules from overriding container node_modules
      - /app/node_modules
    environment:
      - PORT=3001
      - DATABASE_URL=file:./dev.db
    # Run Prisma migrations first, then start development server
    command: >
      sh -c "npx prisma generate && npx prisma db push && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    # Make sure Vite binds to 0.0.0.0 so we can access it from host
    command: npm run dev -- --host 0.0.0.0
